# Pre-commit hooks. Install once: `pre-commit install`
# After install, hooks run automatically on `git commit`. Bypass for one
# commit with `git commit --no-verify` (sparingly; the point is they catch
# things you didn't notice).
#
# Run against the whole repo on demand: `pre-commit run --all-files`.

repos:
  # ── Secret scanning ───────────────────────────────────────────────────
  # gitleaks blocks any commit that touches a file matching its detection
  # rules. .gitleaks.toml at repo root allowlists the CoinGecko platforms
  # field (public on-chain addresses), so legitimate sidecar updates pass.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
