# Crypto Conviction System — orchestrator + global config.
# Edit these to match your investing thesis. Agent 8 reads this.

# ── Tokens under coverage ───────────────────────────────────────────────
# Initial set; add more anytime. Keys must match shared/tokens.py.
tokens:
  - LINK
  - AAVE
  - ONDO
  - ENA
  - SUI
  - AERO
  - OGN
  - NMR
  - AVNT
  - XMR

# ── Orchestrator weighting (must sum to 1.0) ────────────────────────────
# How much each specialist agent's score contributes to the final 0-100 conviction.
# Default = balanced. Tune to your priors.
agent_weights:
  tokenomics: 0.15
  revenue:    0.18
  security:   0.18
  onchain:    0.15
  team:       0.10
  moat:       0.12
  macro:      0.12

# ── Personal investing config ───────────────────────────────────────────
horizon: "1-2Y"          # 3M | 6M | 1-2Y | 4Y
risk_tolerance: moderate # conservative | moderate | aggressive
target_position_pct: 5   # default % of portfolio per position; orchestrator scales by conviction
portfolio: {}            # symbol -> current_pct, used for concentration risk check; empty = skip

# ── Hard red-flag rules (auto-reject regardless of score) ───────────────
red_flags:
  # Agent 3 returns security_tier on 1-5 scale (1=highest risk, 5=battle-tested).
  # Reject only when tier < 3 — i.e. "real concerns" (tier 2) or "high risk" (tier 1).
  # Tier 3 ("moderate risk, well-known") and tier 4 ("solid, minor incidents only or
  # fully recovered") flow into composite score but do NOT auto-reject. The previous
  # threshold of 5 was effectively "reject everything" — only UNI hit tier 5 across
  # the 13-token replay scope (2026-05-17), confirming the bar was unmeetable for
  # L1 chains whose security model isn't audit-centric (XRP, ADA, AVAX, etc).
  reject_if_security_below: 3
  reject_if_holder_concentration_above: 0.5   # top-10 holding > 50% → AVOID
  reject_if_unlock_pressure_next_90d_above: 0.25  # >25% supply unlocking → AVOID
  # If the security agent didn't run, fail closed (AVOID with reason "security
  # agent missing") rather than silently bypass the security_tier gate.
  require_security_agent: true
  # If the loaded-agent coverage drops below this fraction of total config
  # weight, auto-reject. Prevents silent 2-of-7 or 3-of-7 verdicts.
  min_agent_coverage_pct: 0.70
  # Agents with data_as_of older than this fail-close. Default applies to
  # every agent unless overridden in max_data_age_hours_per_agent below.
  max_data_age_hours: 48
  # Per-agent overrides. Reason for each override documented inline.
  max_data_age_hours_per_agent:
    # security: stamp source is now `security_collection_log.collected_at`
    # — the time of the most recent collect run, NOT the underlying
    # audit_date (the original conceptual bug, fixed in the (c) work).
    # The gate now correctly tests "how stale is our collection?" The
    # 6mo threshold is now a safety net for "we haven't run collect in
    # forever," not a workaround for the audit_date conflation. Consider
    # tightening to 168 (7d) or 48 (default) once the batch cadence is
    # consistent enough that aggressive freshness is meaningful here.
    security: 4320   # 6 months (180 days × 24h)
    # moat: TVL, category rank, dev-ecosystem signal all shift on weekly-
    # to-monthly cadence. Re-collecting daily is wasted API credits with
    # no information lift. 7d gate keeps signal-to-noise honest.
    moat: 168        # 7 days
    # macro: cycle phase / BTC correlation / Fear & Greed are smoothed
    # over windows by construction. Sub-daily refreshes don't change the
    # verdict. 7d matches the underlying data cadence.
    macro: 168       # 7 days

# ── Models ──────────────────────────────────────────────────────────────
# Root agent uses Opus for planning; sub-LLM calls inside RLMs use Sonnet.
models:
  root: claude-opus-4-6
  sub:  claude-sonnet-4-6
  research: claude-sonnet-4-6
