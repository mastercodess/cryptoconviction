# Crypto Conviction System — orchestrator + global config.
# Edit these to match your investing thesis. Agent 8 reads this.

# ── Tokens under coverage ───────────────────────────────────────────────
# Initial set; add more anytime. Keys must match shared/tokens.py.
tokens:
  - LINK
  - AAVE
  - ONDO
  - ENA
  - SUI
  - AERO
  - OGN
  - NMR
  - AVNT
  - XMR

# ── Orchestrator weighting (must sum to 1.0) ────────────────────────────
# How much each specialist agent's score contributes to the final 0-100 conviction.
# Default = balanced. Tune to your priors.
agent_weights:
  tokenomics: 0.15
  revenue:    0.18
  security:   0.18
  onchain:    0.15
  team:       0.10
  moat:       0.12
  macro:      0.12

# ── Personal investing config ───────────────────────────────────────────
horizon: "1-2Y"          # 3M | 6M | 1-2Y | 4Y
risk_tolerance: moderate # conservative | moderate | aggressive
target_position_pct: 5   # default % of portfolio per position; orchestrator scales by conviction
portfolio: {}            # symbol -> current_pct, used for concentration risk check; empty = skip

# ── Hard red-flag rules (auto-reject regardless of score) ───────────────
red_flags:
  reject_if_security_below: 5         # Agent 3 score (1-10) below this → AVOID
  reject_if_holder_concentration_above: 0.5   # top-10 holding > 50% → AVOID
  reject_if_unlock_pressure_next_90d_above: 0.25  # >25% supply unlocking → AVOID
  # If the security agent didn't run, fail closed (AVOID with reason "security
  # agent missing") rather than silently bypass the security_tier gate.
  require_security_agent: true
  # If the loaded-agent coverage drops below this fraction of total config
  # weight, auto-reject. Prevents silent 2-of-7 or 3-of-7 verdicts.
  min_agent_coverage_pct: 0.70
  # Agents with data_as_of older than this fail-close. Default applies to
  # every agent unless overridden in max_data_age_hours_per_agent below.
  max_data_age_hours: 48
  # Per-agent overrides. Reason for each override documented inline.
  max_data_age_hours_per_agent:
    # security: stamp source is `audit_date` (when the audit happened),
    # NOT a collector-side timestamp (when we last refreshed our view).
    # The gate is therefore testing "how old is the most recent audit"
    # rather than "how stale is our collection." 6mo lets a 2-yr-old
    # audit still trigger stale while preserving audit-date visibility.
    # TODO: add a `collected_at` column to audit / exploit_history /
    # code_health / dependency, switch stamp_data_as_of to use it, then
    # tighten this back to 48h — at which point the gate tests collection
    # freshness, which is what the system actually wants.
    security: 4320   # 6 months (180 days × 24h)

# ── Models ──────────────────────────────────────────────────────────────
# Root agent uses Opus for planning; sub-LLM calls inside RLMs use Sonnet.
models:
  root: claude-opus-4-6
  sub:  claude-sonnet-4-6
  research: claude-sonnet-4-6
